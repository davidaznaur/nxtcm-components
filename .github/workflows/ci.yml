name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check lockfile for git-based dependencies
        run: |
          if grep -qE '"resolved":\s*"(git\+|git:|github:)' package-lock.json; then
            echo "::error::git-based dependency found in lockfile (supply chain risk)"
            exit 1
          fi

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run prettier:check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: npm run type-check

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest unit tests
        run: |
          mkdir -p test-results
          npm test -- --coverage --json --outputFile=test-results/jest-results.json

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: jest-coverage
          path: |
            coverage/
            test-results/jest-results.json
          retention-days: 14

  test:
    name: Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright component tests
        id: ct_run
        continue-on-error: true
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/playwright-ct-results.json
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/playwright-ct-junit.xml
        run: >-
          npx playwright test -c playwright-ct.config.ts
          --reporter=list,github,html,json,junit

      - name: Build per-test CT summary
        if: always()
        run: |
          node utils/summarize-playwright-ct.mjs \
            --json test-results/playwright-ct-results.json \
            --markdown test-results/playwright-ct-summary.md \
            --summary-json test-results/playwright-ct-summary.json
          if [ "${{ steps.ct_run.outcome }}" = "failure" ]; then
            cat test-results/playwright-ct-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-ct-report
          path: |
            playwright-report/
            test-results/playwright-ct-results.json
            test-results/playwright-ct-junit.xml
            test-results/playwright-ct-summary.md
            test-results/playwright-ct-summary.json
          retention-days: 7

      - name: Fail job if CT failed
        if: steps.ct_run.outcome == 'failure'
        run: exit 1

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: |
            packages/nxtcm-dashboard/dist/
            packages/nxtcm-rosa-hcp-wizard/dist/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/playwright-e2e-results.json
        run: |
          mkdir -p test-results
          npx playwright test --reporter=list,html,json

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/playwright-e2e-results.json
          retention-days: 7

  coverage-contract:
    name: Assemble Coverage Contract
    runs-on: ubuntu-latest
    needs: [unit-test, test, e2e]
    if: always()
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Download jest coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: jest-coverage
          path: artifacts/jest-coverage
        continue-on-error: true

      - name: Download CT report artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: playwright-ct-report
          path: artifacts/playwright-ct-report
        continue-on-error: true

      - name: Download E2E report artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: playwright-report
          path: artifacts/playwright-report
        continue-on-error: true

      - name: Build test-coverage-data.json
        run: |
          node utils/build-test-coverage-data.mjs \
            --jest-results artifacts/jest-coverage/test-results/jest-results.json \
            --ct-summary artifacts/playwright-ct-report/test-results/playwright-ct-summary.json \
            --e2e-results artifacts/playwright-report/test-results/playwright-e2e-results.json \
            --output test-coverage-data.json

      - name: Upload canonical coverage contract
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-coverage-data
          path: test-coverage-data.json
          retention-days: 30

  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Upload Storybook build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 7
